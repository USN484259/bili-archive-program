<!DOCTYPE html>
<!-- This file contains code written by Copilot, GPT 4.1 -->
<html>
<head>
	<meta charset="utf-8">
</head>
<body>
	<h1 id="title">Video Search for <a id="video_link"></a></h1>

	<div id="condition-list"></div>
	<button id="add-condition">Add Condition</button>
	<div id="sort-condition">
		<span>Sorted by </label>
		<select id="sort_keys">
		</select>
		<select id="sort_order">
			<option value="">ascending</option>
			<option value="-" selected>descending</option>
		</select>
	</div>
	<div id="controls">
		<button id="search" disabled>search</button>
		<button id="reset">reset</button>

		<div id="selection">
			<span id="selected-count">0 selected</span>
			<button id="deselect">Clear selection</button>
			<button id="copy-button">Copy to clipboard</button>
		</div>
	</div>
	<div>
		<textarea id="output" readonly hidden></textarea>
	</div>

	<div class="pages-bar">
		<span class="pages-btn"></span>
		<span>
			<input class="goto-input", type="number", min="1"/>
			<button class="goto-button">goto</button>
		</span>
	</div>

	<label for="results" id="status"></label>
	<table id="results">
		<thead>
			<tr>
				<th>cover</th>
				<th>title</th>
				<th>author</th>
				<th>duration</th>
				<th>likes/views</th>
				<th>mtime</th>
			</tr>
		</thead>
		<tbody>
		</tbody>
	</table>

	<div class="pages-bar">
		<span class="pages-btn"></span>
		<span>
			<input class="goto-input", type="number", min="1"/>
			<button class="goto-button">goto</button>
		</span>
	</div>
<style>
#condition-list {
	margin-bottom: 10px;
}
#sort-condition {
	display: flex;
	align-items: center;
	margin: 4px;
}
#controls {
	display: flex;
}
#search {
	font-weight: bold;
	align-self: center;
	padding: 10px;
}
#reset {
	align-self: center;
}
#selection {
	margin-left: auto;
	display: flex;
	flex-direction: column;
}
#selected-count {
	margin-left:10px;
}

#output {
	width: 100%;
	height: 40px;
	resize: vertical;
}

.condition-row {
	display: flex;
	align-items: center;
	margin-bottom: 4px;
}
.condition-row select, .condition-row input {
	margin-right: 8px;
	padding: 2px 4px;
}
.condition-row button {
	padding: 2px 8px;
}
.pages-bar {
	margin-top: 10px;
	text-align: center;
}
.pages-bar button {
	margin: 0 2px;
	padding: 2px 8px;
}
table {
	width: 100%;
	border-collapse: collapse;
}
thead {
	border: 1px solid;
}
th, td {
	padding: 10px;
}
tbody tr:nth-child(odd) {
	background-color: #cccccc;
}
tbody tr:nth-child(even) {
	background-color: #eeeeee;
}
.selected-row {
	background-color: #a0d8ef !important;
}
</style>

	<script type="module">

import * as config from "/config.js";
const util_module = import(config.util_module);
const params = new URLSearchParams(window.location.search);
const db_path = decodeURIComponent(params.get("db"));
let video_root = decodeURIComponent(params.get("path"));
if (!video_root.endsWith('/'))
	video_root += '/';

const page_size = 20;
let conditions = [];
let page = 0;

let selectedBvidSet = null;


const sort_keys = [
	"mtime", "title", "tags", "parts", "duration", "ctime", "pubtime", "views", "uname", "uid"
];

const query_keys = [
	"bvid", "title", "tags", "uname", "uid", "desc", "mtime", "parts", "duration", "ctime", "pubtime", "views", "likes", "size"
];

function initSortKeys(key = "mtime") {
	const sort_elem = document.getElementById("sort_keys");
	for (const k of sort_keys) {
		const opt = document.createElement("option");
		opt.value = k;
		opt.textContent = k;
		if (k === key) opt.selected = true;
		sort_elem.appendChild(opt);
	}
	document.getElementById("sort_order").selectedIndex = 1;
}

function createConditionRow(key = "title", value = "") {
	const row = document.createElement("div");
	row.className = "condition-row";
	const keySel = document.createElement("select");
	for (const k of query_keys) {
		const opt = document.createElement("option");
		opt.value = k;
		opt.textContent = k;
		if (k === key) opt.selected = true;
		keySel.appendChild(opt);
	}
	const valInput = document.createElement("input");
	valInput.type = "text";
	valInput.value = value;
	const delBtn = document.createElement("button");
	delBtn.textContent = "Remove";
	delBtn.type = "button";
	delBtn.onclick = () => {
		row.remove();
	};
	row.appendChild(keySel);
	row.appendChild(valInput);
	row.appendChild(delBtn);
	return row;
}

function collectConditions() {
	const list = document.getElementById("condition-list");
	const rows = list.querySelectorAll(".condition-row");
	const sort = document.getElementById("sort_keys");
	const order = document.getElementById("sort_order");
	const conds = [];
	for (const row of rows) {
		const key = row.querySelector("select").value;
		const value = row.querySelector("input").value.trim();
		if (key && value) conds.push([key, value]);
	}
	conds.push(["order", order.value + sort.value]);
	return conds;
}

async function query() {
	const conds = conditions;
	const searchParams = new URLSearchParams();
	for (const [key, value] of conds) {
		searchParams.append(key, value);
	}
	searchParams.append("limit", page_size);
	searchParams.append("offset", page * page_size);
	let url = new URL(db_path, document.location);
	url.search = searchParams;
	let resp = await fetch(url);
	if (!resp.ok) {
		throw new Error("" + resp.statusText + ": " + url);
	}
	return await resp.json();
}

function renderResultsTable(data) {
	const tbody = document.querySelector("#results tbody");
	tbody.innerHTML = "";
	for (const row of data) {
		const tr = document.createElement("tr");
		const coverTd = document.createElement("td");
		if (row.cover) {
			const img = document.createElement("img");
			img.src = video_root + row.bvid + '/' + row.cover;
			img.style.maxWidth = "120px";
			img.style.maxHeight = "80px";
			img.setAttribute("loading", "lazy");
			img.onerror = util.handle_legacy_cover_image;
			coverTd.appendChild(img);
		}
		tr.appendChild(coverTd);
		const titleTd = document.createElement("td");
		const hrefTd = document.createElement("a");
		util.make_video_url(hrefTd, video_root + row.bvid)
		hrefTd.textContent = row.title;
		titleTd.appendChild(hrefTd);
		tr.appendChild(titleTd);
		const authorTd = document.createElement("td");
		authorTd.textContent = row.uname;
		tr.appendChild(authorTd);
		const durationTd = document.createElement("td");
		durationTd.textContent = util.duration_string(row.duration);
		tr.appendChild(durationTd);
		const lvTd = document.createElement("td");
		lvTd.textContent = "" + util.stat_string(row.likes) + "/" + util.stat_string(row.views);
		tr.appendChild(lvTd);
		const mtimeTd = document.createElement("td");
		mtimeTd.textContent = util.localtime_string(row.mtime * 1000);
		tr.appendChild(mtimeTd);

		tr.addEventListener("click", (e) => {
			if (e.target !== hrefTd)
				handleRowClick(tr, row.bvid);
		});
		if (selectedBvidSet.has(row.bvid)) {
			tr.classList.add("selected-row");
		}

		tbody.appendChild(tr);
	}
}

function cleanResultsTable() {
	const tbody = document.querySelector("#results tbody");
	for (let tr of tbody.children) {
		tr.classList.remove("selected-row");
	}
}

function saveSession(save_conds) {
	try {
		sessionStorage.setItem("video_search_page", page);
		if (save_conds) {
			const sort = document.getElementById("sort_keys").value;
			const order = document.getElementById("sort_order").value;
			sessionStorage.setItem("video_search_conditions", JSON.stringify(conditions));
			sessionStorage.setItem("video_search_sort", sort);
			sessionStorage.setItem("video_search_order", order);
		}
	} catch {}
}

function loadSession() {
	try {
		const list = document.getElementById("condition-list");
		let conds = sessionStorage.getItem("video_search_conditions");
		let sort = sessionStorage.getItem("video_search_sort");
		let order = sessionStorage.getItem("video_search_order");
		let savedPage = sessionStorage.getItem("video_search_page");
		if (conds) {
			try {
				conds = JSON.parse(conds);
				list.innerHTML = "";
				for (const [key, value] of conds) {
					if (key !== "order") list.appendChild(createConditionRow(key, value));
				}
			} catch {}
		}
		if (sort) {
			const sortElem = document.getElementById("sort_keys");
			for (let i = 0; i < sortElem.options.length; ++i) {
				if (sortElem.options[i].value === sort) sortElem.selectedIndex = i;
			}
		}
		if (order) {
			const orderElem = document.getElementById("sort_order");
			for (let i = 0; i < orderElem.options.length; ++i) {
				if (orderElem.options[i].value === order) orderElem.selectedIndex = i;
			}
		}
		if (savedPage) {
			page = parseInt(savedPage) || 0;
		}
	} catch {}
}

function create_page_button(bar, text, func, active = false) {
	const btn = document.createElement("button");
	btn.textContent = text;
	if (active) btn.style.fontWeight = "bold";
	btn.onclick = func;
	bar.appendChild(btn);
}

function create_page_spacing(bar, text) {
	const elem = document.createElement("span");
	elem.textContent = text;
	bar.appendChild(elem);
}

function renderPagesBar(bar, count) {
	bar.innerHTML = "";
	const totalPages = Math.max(1, Math.ceil(count / page_size));
	const maxShow = 9;
	let start = Math.max(0, page - Math.floor(maxShow / 2));
	let end = Math.min(totalPages, start + maxShow);
	if (end - start < maxShow) start = Math.max(0, end - maxShow);
	create_page_button(bar, "<<", () => { page = Math.max(0, page - 1); saveSession(false); update(); });
	create_page_spacing(bar, "...");

	for (let i = start; i < end; ++i) {
		create_page_button(bar, (i + 1).toString(), () => { page = i; saveSession(false); update(); }, (i == page));
	}

	create_page_spacing(bar, "...");
	create_page_button(bar, ">>", () => { page = Math.min(page + 1, totalPages - 1); saveSession(false); update(); });

	const goto_input = bar.parentElement.querySelector(".goto-input");
	goto_input.placeholder = totalPages.toString();
	goto_input.max = totalPages.toString();
}

async function update() {
	const searchBtn = document.getElementById("search");
	let status = document.getElementById("status");
	searchBtn.disabled = true;
	try {
		status.replaceChildren("searching");
		let results = await query();
		status.replaceChildren("" + results.count + " results, page " + (page + 1));
		renderResultsTable(results.data);
		for (const bar of document.getElementsByClassName("pages-btn")) {
			renderPagesBar(bar, results.count);
		}
	} catch {
		status.replaceChildren("search failed");
	} finally {
		searchBtn.disabled = false;
	}
}

function updateSelectedCount() {
	const countSpan = document.getElementById("selected-count");
	countSpan.textContent = `${selectedBvidSet.size} selected`;
}

function handleRowClick(tr, bvid) {
	if (selectedBvidSet.has(bvid)) {
		selectedBvidSet.delete(bvid);
		tr.classList.remove("selected-row");
	} else {
		selectedBvidSet.add(bvid);
		tr.classList.add("selected-row");
	}
	updateSelectedCount();
}

function copySelectedBvids() {
	if (selectedBvidSet !== null && selectedBvidSet.size > 0) {
		const text = Array.from(selectedBvidSet).join(" ");
		try {
			navigator.clipboard.writeText(text);
		} catch {}
		const output = document.getElementById("output");
		output.value = text;
		output.hidden = false;
	}
}

document.addEventListener("DOMContentLoaded", () => util_module.then((util) => {
	globalThis.util = util;

	const video_link = document.getElementById("video_link");
	video_link.href = video_root + "index.html";
	video_link.append(video_root);

	const list = document.getElementById("condition-list");
	const addBtn = document.getElementById("add-condition");
	const searchBtn = document.getElementById("search");
	const resetBtn = document.getElementById("reset");
	const selectionBtn = document.getElementById("deselect");
	const copyBtn = document.getElementById("copy-button");
	const outputArea = document.getElementById("output");

	addBtn.onclick = () => {
		list.appendChild(createConditionRow());
	};
	searchBtn.onclick = () => {
		conditions = collectConditions();
		page = 0;
		saveSession(true);
		update();
	};
	resetBtn.onclick = () => {
		sessionStorage.clear();
		list.innerHTML = "";
		initSortKeys();
		page = 0;
		conditions = collectConditions();
		update();
	};

	selectionBtn.addEventListener("click", (e) => {
		selectedBvidSet.clear();
		cleanResultsTable();
		updateSelectedCount();
		outputArea.hidden = true;
	});
	copyBtn.addEventListener("click", copySelectedBvids);

	for (const gotoBtn of document.getElementsByClassName("goto-button")) {
		gotoBtn.onclick = () => {
			const goto_input = gotoBtn.parentElement.querySelector("input");
			let value = Number(goto_input.value);
			if (value > 0) {
				goto_input.value = "";
				page = value - 1;
				saveSession(false);
				update();
			}
		};
	}
	initSortKeys();
	loadSession();

	if (selectedBvidSet == null)
		selectedBvidSet = new Set();
	updateSelectedCount();

	conditions = collectConditions();
	update();
}));

</script>
</body>
</html>
